name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftformat swiftlint

      - name: SwiftFormat (lint)
        run: swiftformat --lint .

      - name: SwiftLint
        run: ./scripts/swiftlint.sh --strict

      - name: Build
        run: swift build

      - name: Test
        run: ./scripts/swift-test.sh
